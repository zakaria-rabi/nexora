version: "3.9"

services:
  # ── PostgreSQL Database ─────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nexora-postgres
    environment:
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora_secret
      POSTGRES_DB: nexora_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: nexora-backend
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed_data.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: nexora-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000/api

  # ── pgAdmin (optional DB viewer) ────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexora-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexora.com
      PGADMIN_DEFAULT_PASSWORD: Admin123!
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
